services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Ocular\Chatbot\:
    resource: "../Classes/*"
    exclude: "../Classes/Domain/Model/*"

  Ocular\Chatbot\Hooks\ChunkSyncHook:
    public: true

  Psr\Http\Client\ClientInterface:
    class: GuzzleHttp\Client

  Ocular\Chatbot\Service\RateLimitService: ~

  Ocular\Chatbot\Command\CleanupRateLimitCommand:
    tags:
        - name: 'console.command'
          command: 'chatbot:cleanup-ratelimit'
          description: 'Deletes rate limit records older than 24 hours'
          schedulable: true

  Ocular\Chatbot\Command\IngestCommand:
    tags:
        - name: 'console.command'
          command: 'chatbot:ingest'
          description: 'Reads Ocular content, embeds chunks via Voyage AI, and ingests them into Qdrant'

    # Qdrant - vector database ingestion (used by chatbot:ingest)
  Ocular\Chatbot\Service\QdrantIngester:
    arguments:
      $config: '@Qdrant\Config'
      $collectionName: "%env(QDRANT_COLLECTION)%"
      # Must match the named vector used when writing (QdrantIngester::addDocument)
      # and querying (ChatService: ->setUsing('openai')).
      $vectorName: "openai"

  # Qdrant config - connection settings
  Qdrant\Config:
    arguments:
      $host: "%env(QDRANT_HOST)%"
      $port: "%env(int:QDRANT_PORT)%"

  # Qdrant - vector database connection
  LLPhant\Embeddings\VectorStores\Qdrant\QdrantVectorStore:
    arguments:
      $config: '@Qdrant\Config'
      $collectionName: "%env(QDRANT_COLLECTION)%"

  Ocular\Chatbot\Service\ChatService:
    arguments:
      $collectionName: "%env(QDRANT_COLLECTION)%"
      $siteBaseUrl: "%env(SITE_BASE_URL)%"

  # Groq - LLM that generates the final answer
  LLPhant\Chat\OpenAIChat:
    arguments:
      $config: '@LLPhant\OpenAIConfig'

  LLPhant\OpenAIConfig:
    arguments:
      $apiKey: "%env(GROQ_API_KEY)%"
      $url: "%env(LLM_API_URL)%"
      $model: "%env(LLM_MODEL)%"
      $modelOptions:
        # temperature: 0.0
        max_completion_tokens: 1536
        reasoning_effort: default
        reasoning_format: hidden
        

